<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAZAR List</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <nav class="navbar">
        <button class="nav-btn" id="homeBtn">Home</button>
        <div id="authArea"></div>
        <!-- Login / Signup popup -->
        <div class="modal-overlay" id="authModal">
            <div class="modal">
                <button class="auth-close" id="authClose">✕</button>
                <h2 id="authTitle">Login</h2>
                <div class="auth-error" id="authError"></div>

                <input type="text" id="authName" placeholder="নাম" style="display:none" />
                <input type="email" id="authEmail" placeholder="Email" />
                <input type="password" id="authPassword" placeholder="Password" />

                <button class="save-btn" id="authSubmit">Login</button>
                <p class="auth-toggle" id="authToggle">Account নেই? Sign up করুন</p>
            </div>
        </div>

    </nav>

    <main class="card">
        <div class="card-top">
            <button class="nav-btn" id='saveForFutureBtn'>Save for future</button>
            <button class="clear-btn" id="clearAllBtn">Clear All</button>
        </div>

        <div class="add-row">
            <input type="text" id="itemInput" placeholder="নতুন item লিখুন..." />
            <button class="save-btn" id="addBtn">Add list</button>
        </div>


        <ul class="item-list" id="itemList"></ul>

        <div class="pagination" id="pagination"></div>
    </main>
    <!-- Change Password popup -->
    <div class="modal-overlay" id="passModal">
        <div class="modal">
            <button class="auth-close" id="passClose">✕</button>
            <h2>Change Password</h2>
            <div class="auth-error" id="passError"></div>
            <input type="password" id="currentPass" placeholder="বর্তমান password" />
            <input type="password" id="newPass" placeholder="নতুন password" />
            <button class="save-btn" id="passSubmit">Change</button>
        </div>
    </div>

    <script src="/app.js"></script>
    <script src="/auth.js"></script>

</body>

</html>
